<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* navbar样式 */
.navbar {
  display: flex;
  justify-content: center;
  gap: 30px;
  background: #333;
  padding: 15px;
  width: 100%;
}

.navbar a {
  color: white;
  text-decoration: none;
  transition: 0.3s;
  display: inline-block;
}

.navbar a:hover {
  transform: scale(1.2);
  text-decoration: underline;
}

/* 其他 */
h1 {
  margin-top: 40px;
}

.box {
  background: white;
  padding: 15px;
  margin: 15px;
  border-radius: 10px;
  width: 1200px;
  text-align: center;
}
</style>
</head>

<body>

<!-- ⭐ navbar必须在body里 -->
<div class="navbar">
  <a href="index.html">Home</a>
  <a href="about.html">About Us</a>
  <a href="physics.html">Physics</a>
  <a href="envisci.html">Environmental Science</a>
  <a href="upload-pictures">Upload Pictures</a>
</div>

<h1>Upload your pictures here!</h1>

<!-- LOGIN -->
<div class="box">
  <h2>Login System</h2>

  <input id="email" placeholder="email">
  <input id="password" placeholder="password">

  <button onclick="register()">Sign Up</button>
  <button onclick="login()">Log In</button>

  <p id="userStatus">Not logged in</p>
</div>

<!-- UPLOAD -->
<div class="box">
  <h2>Upload Image</h2>

  <input type="file" id="fileInput">
  <p id="status"></p>

  <img id="preview" width="200">
</div>

<!-- GALLERY -->
<div class="box">
  <h2>Gallery</h2>
  <div id="gallery"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCg6tSHCPJqgTXo3QX1DEwgdROLonj9p20",
  authDomain: "science-af1d8.firebaseapp.com",
  databaseURL: "https://science-af1d8-default-rtdb.firebaseio.com",
  projectId: "science-af1d8",
  storageBucket: "science-af1d8.firebasestorage.app",
  messagingSenderId: "779390611141",
  appId: "1:779390611141:web:02c169354a1e8dbf4f0aac"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const cloudName = "dfc4j6dae";
const uploadPreset = "Upload_Picture";

let uid = null;
let userEmail = null;

const userStatus = document.getElementById("userStatus");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");

window.register = function () {
  createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
  .catch(err => alert(err.message));
};

window.login = function () {
  signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
  .catch(err => alert(err.message));
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    uid = user.uid;
    userEmail = user.email;

    userStatus.innerText = "Logged in as " + userEmail;
    loadImages();
  } else {
    userStatus.innerText = "Not logged in";
  }
});

document.getElementById("fileInput").addEventListener("change", async function () {

  if (!uid) {
    alert("Please log in to upload picture");
    return;
  }

  const file = this.files[0];

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", uploadPreset);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
    {
      method: "POST",
      body: formData
    }
  );

  const data = await res.json();

  push(ref(db, "users/" + uid + "/images"), {
    url: data.secure_url,
    email: userEmail
  });

  document.getElementById("preview").src = data.secure_url;
});

function loadImages() {
  onValue(ref(db, "users/" + uid + "/images"), (snapshot) => {

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    snapshot.forEach(child => {
      const d = child.val();

      const img = document.createElement("img");
      img.src = d.url;
      img.width = 200;

      gallery.appendChild(img);
    });
  });
}
        
</script>
  
</body>
</html>
