<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Physics</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;

  /* ⭐ 整体居中 */
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* 标题 */
h1 {
  margin-top: 40px;
  text-align: center;
}

/* 上传区域 */
.upload-box {
  margin-top: 30px;
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

/* 图片展示 */
#preview {
  margin-top: 20px;
  max-width: 300px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>Physics</h1>

<div class="upload-box">
  <p>Upload a picture:</p>
  <input type="file" id="fileInput">
  <br>
  <img id="preview">
</div>

<script>
document.getElementById("fileInput").addEventListener("change", function () {
  const file = this.files[0];

  if (file) {
    const url = URL.createObjectURL(file);
    document.getElementById("preview").src = url;
  }
});
</script>

</body>
</html>
