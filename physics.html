<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f8fafc; /* ⭐ same as other page */

  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* navbar */
.navbar {
  display: flex;
  justify-content: center;
  gap: 30px;
  background: #93c5fd; /* ⭐ blue */
  padding: 15px;
  width: 100%;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.navbar a {
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.navbar a:hover {
  transform: scale(1.2);
  text-decoration: underline;
}

/* 内容区域 */
.container {
  flex: 1;
  text-align: center;
  padding: 20px;
}

/* 标题 */
h1 {
  margin-top: 40px;
}

/* footer */
.footer {
  color: #64748b; /* ⭐ same softer gray */
  text-align: center;
  padding: 20px;
  border-top: 1px solid #ddd;
}

/* dropdown 外层 */
.dropdown {
  position: relative;
}

/* 下拉内容（默认隐藏） */
.dropdown-content {
  display: none;
  position: absolute;
  top: 100%;        /* 出现在下面 */
  left: 0;

  background: white;
  min-width: 180px;
  border-radius: 10px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);

  overflow: hidden;
}

/* 每个选项 */
.dropdown-content a {
  display: block;
  padding: 10px;
  color: #334155;
  text-decoration: none;
}

/* hover 效果 */
.dropdown-content a:hover {
  background: #f1f5f9;
  transform: scale(1.05);
}

/* ⭐ hover 显示 */
.dropdown:hover .dropdown-content {
  display: block;
}

.toc {
  position: fixed;
  left: 100px;
  top: 120px;

  display: flex;
  flex-direction: column;
  gap: 10px;
}

.toc a {
  text-decoration: none;
  color: #3b82f6;
  font-size: 20px;
}

.toc a:hover {
  text-decoration: underline;
}

html {
  scroll-behavior: smooth;
}
