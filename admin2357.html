<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Uploaded Pictures</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  margin: 0;
}

h1 {
  text-align: center;
  margin: 20px;
}

#gallery {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>Uploaded Pictures</h1>
<div id="gallery"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyCg6tSHCPJgTXo3QX1DEwgdROLonj9p20",
  authDomain: "science-af1d8.firebaseapp.com",
  databaseURL: "https://science-af1d8-default-rtdb.firebaseio.com",
  projectId: "science-af1d8",
  storageBucket: "science-af1d8.firebasestorage.app",
  messagingSenderId: "779390611141",
  appId: "1:779390611141:web:02c169354a1e8dbf4f0aac"
});

const db = getDatabase(app);
const gallery = document.getElementById("gallery");

onValue(ref(db, "users"), (snapshot) => {

  gallery.innerHTML = "";

  snapshot.forEach(userSnap => {
    const imagesSnap = userSnap.child("images");

    imagesSnap.forEach(child => {
      const data = child.val();

      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.src = data.url;

      const info = document.createElement("p");
      info.innerText =
        "Uploader: " + (data.email || "unknown");

      const time = document.createElement("p");
      time.style.fontSize = "12px";
      time.style.color = "gray";
      time.innerText =
        data.time ? new Date(data.time).toLocaleString() : "";

      card.appendChild(img);
      card.appendChild(info);
      card.appendChild(time);

      gallery.appendChild(card);
    });
  });

});

</script>

</body>
</html>
