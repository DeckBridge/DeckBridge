<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>About Us</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
}

  .navbar a {
  color: white;
  text-decoration: none;
  transition: 0.3s;
  display: inline-block; /* 让transform生效更稳定 */
}

.navbar a:hover {
  transform: scale(1.2);
  text-decoration: underline;
}
  
/* 顶部 */
.header {
  background: #2c3e50;
  color: white;
  padding: 10px;
  text-align: center;
}

/* 容器 */
.container {
  width: 30%;
  padding: 20px;
}

/* 卡片 */
.card {
  display: flex;
  align-items: center;
  gap: 50px;

  background: white;
  padding: 15px;
  margin: 20px;

  border-radius: 10px;
}

/* 头像 */
.card img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  object-fit: cover;
}

.info {
  display: flex;
  flex-direction: column;
}

.name {
  font-weight: bold;
}

.role {
  font-size: 13px;
  color: gray;
}

/* 按钮 */
.back.btn {
  display: inline-block;
  background: white;
  color: black;
  padding: 10px 15px;
  text-decoration: none;
  border-radius: 8px;
}
</style>

</head>

<body>

<div class="header">
  <h1>About Us</h1>
</div>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/100">
    <div class="info">
      <div class="name">Emily Chen</div>
      <div class="role">Co-founder</div>
      <div>emily@gmail.com</div>
    </div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/100">
    <div class="info">
      <div class="name">Gia Jing</div>
      <div class="role">Co-founder</div>
      <div>giajing3@gmail.com</div>
    </div>
  </div>

</div>

<a href="index.html" class="back btn">
  <button>Back to Main Page</button>
</a>

</body>
</html>
