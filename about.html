<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>About Us</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
}

/* 顶部 */
.header {
  text-align: center;
  background: #2c3e50;
  color: white;
  padding: 20px;
}

/* 容器 */
.container {
  width: 60%;
  margin: 20px auto;
}

/* 每个人卡片（全部直接展示） */
.card {
  display: flex;
  align-items: center;
  gap: 20px;
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* 头像 */
.card img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  object-fit: cover;
}

/* 信息 */
.info {
  display: flex;
  flex-direction: column;
}

.name {
  font-size: 18px;
  font-weight: bold;
}

.role {
  color: gray;
  font-size: 14px;
}

.email {
  font-size: 13px;
  color: #555;
  margin-top: 3px;
}

/* 返回按钮 */
.back {
  text-align: center;
  margin: 30px;
}

.back a {
  text-decoration: none;
  padding: 10px 15px;
  background: #333;
  color: white;
  border-radius: 5px;
}
</style>
</head>

<body>

<div class="header">
  <h1>About Us</h1>
  <p>Environmental Science Team 🌍</p>
</div>

<div class="container">

  <!-- 👤 成员1 -->
  <div class="card">
    <img src="https://via.placeholder.com/100">
    <div class="info">
      <div class="name">Emily Chen</div>
      <div class="role">Co-founder</div>
      <div class="email">emily@gmail.com</div>
    </div>
  </div>

  <!-- 👤 成员2 -->
  <div class="card">
    <img src="https://via.placeholder.com/100">
    <div class="info">
      <div class="name">Gia Jing</div>
      <div class="role">Co-founder</div>
      <div class="email">giajing3@gmail.com</div>
    </div>
  </div>

</div>

<!-- 🔙 返回主页 -->
<div class="back">
  <a href="index.html">Back to Main Page</a>
</div>

</body>
</html>
