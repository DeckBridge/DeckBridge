<!DOCTYPE html>

<style>
body {
  margin: 0;

  background: #f4f4f4;
}

/* 顶部 */
.header {
  background: #2c3e50;
  color: white;
  padding: 20px;
}

/* 🔥 全部靠左 */
.container {
  width: 100%;
  padding: 20px;
}

/* 卡片 */
.card {
  display: flex;
  align-items: center;
  gap: 20px;

  background: white;
  padding: 15px;
  margin-bottom: 10px;

  border-radius: 10px;
}

/* 头像 */
.card img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  object-fit: cover;
}

/* 文本 */
.info {
  display: flex;
  flex-direction: column;
}

.name {
  font-weight: bold;
}

.role {
  font-size: 13px;
  color: gray;
}

/* 🔙 按钮 */
.nav {
  padding: 10px 20px;
  background: #eee;
}

.nav a {
  margin-right: 15px;
  text-decoration: none;
  color: black;
}
</style>
</head>

  <h1>About Us</h1>
</div>
