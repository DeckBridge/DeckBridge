<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Physics</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
  display: flex;
  flex-direction: column;
  align-items: center;
}

  .navbar a {
  color: white;
  text-decoration: none;
  transition: 0.3s;
  display: inline-block; /* 让transform生效更稳定 */
}

.navbar a:hover {
  transform: scale(1.2);
  text-decoration: underline;
}

  .navbar {
  display: flex;
  justify-content: center;
  gap: 30px;
  background: #333;
  padding: 15px;
  width: 100%;
}

.navbar a {
  color: white;
  text-decoration: none;
  transition: 0.3s;
  display: inline-block;
}

.navbar a:hover {
  transform: scale(1.2);
  text-decoration: underline;
}

  
/* 标题 */
h1 {
  margin-top: 40px;
  text-align: center;
}

/* 上传区域 */
.upload-box {
  margin-top: 30px;
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

/* 图片展示 */
#preview {
  margin-top: 20px;
  max-width: 300px;
  border-radius: 10px;
}
</style>
</head>

<body>

  <div class="navbar">
  <a href="index.html">Home</a>
  <a href="about.html">About Us</a>
  <a href="physics.html">Physics</a>
  <a href="envisci.html">Environmental Science</a>
  <a href="upload-pictures">Upload Pictures</a>
</div>
  
<h1>Environmental Science</h1>

<div class="upload-box">
  <p>Upload a picture:</p>
  <input type="file" id="fileInput">
  <br>
  <img id="preview">
</div>

<script>
document.getElementById("fileInput").addEventListener("change", function () {
  const file = this.files[0];

  if (file) {
    const url = URL.createObjectURL(file);
    document.getElementById("preview").src = url;
  }
});
</script>

</body>
</html>
