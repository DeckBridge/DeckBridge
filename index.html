<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Environmental Science</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #f2f2f2;
      padding: 50px;
    }

    h1 { color: blue; }
    button { padding: 10px 20px; font-size: 16px; }
  </style>
</head>

<body>

<h1>Welcome Science Nerds!</h1>
<p>This is a site for environmental science</p>

<h2>Upload Image</h2>

<input type="file" id="fileInput">
<p id="status"></p>

<img id="preview" width="300">

<hr>

<h2>Admin Panel</h2>

<input type="password" id="pwd" placeholder="输入密码">
<button onclick="check()">进入</button>

<div id="gallery"></div>

<script type="module">

// 🔥 Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCg6tSHCPJqgTXo3QX1DEwgdROLonj9p20",
  authDomain: "science-af1d8.firebaseapp.com",
  databaseURL: "https://science-af1d8-default-rtdb.firebaseio.com",
  projectId: "science-af1d8",
  storageBucket: "science-af1d8.firebasestorage.app",
  messagingSenderId: "779390611141",
  appId: "1:779390611141:web:02c169354a1e8dbf4f0aac",
  measurementId: "G-0SMFGP5P1X"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔵 Cloudinary配置（必须改）
const cloudName = "dfc4j6dae";
const uploadPreset = "Upload_Picture";

// ===== 上传逻辑 =====
document.getElementById("fileInput").addEventListener("change", async function() {

  const file = this.files[0];
  document.getElementById("status").innerText = "上传中...";

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", uploadPreset);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
    {
      method: "POST",
      body: formData
    }
  );

  const data = await res.json();

  // 显示图片
  document.getElementById("preview").src = data.secure_url;

  // 存 Firebase
  push(ref(db, "images"), data.secure_url);

  document.getElementById("status").innerText = "上传成功！";
});

// ===== 管理员查看 =====
window.check = function() {

  const password = document.getElementById("pwd").value;

  if (password !== "123456") {
    alert("密码错误");
    return;
  }

  onValue(ref(db, "images"), (snapshot) => {
    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    snapshot.forEach(child => {
      const img = document.createElement("img");
      img.src = child.val();
      img.width = 200;
      img.style.margin = "10px";
      gallery.appendChild(img);
    });
  });
};

</script>

</body>
</html>
