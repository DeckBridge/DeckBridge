<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Environmental Science</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f2f2f2;
  align-items: center;
}

/* 🔝 NAVBAR (目录) */
.navbar {
  display: flex;
  gap: 20px;
  padding: 20px;
  background: #333;
  align-items: center;
}

.navbar a {
  color: white;
  text-decoration: none;
}

/* PAGE */
.container {
  padding: 20px;
}

/* LOGIN BOX */
.box {
  background: white;
  padding: 15px;
  margin: 20px 0;
  border-radius: 10px;
}

/* GALLERY */
#gallery img {
  margin: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- 🔝 NAVIGATION (你的目录) -->
<div class="navbar">
  <a href="index.html">Home</a>
  <a href="about.html">About Us</a>
</div>

<div class="container">

<h1>Welcome!</h1>

<p>This is a site for environmental science</p>

<!-- LOGIN -->
<div class="box">
  <h2>Login System</h2>

  <input id="email" placeholder="email">
  <input id="password" placeholder="password">

  <button onclick="register()">Sign Up</button>
  <button onclick="login()">Log In</button>

  <p id="userStatus">Not logged in</p>
</div>

<!-- UPLOAD -->
<div class="box">
  <h2>Upload Image</h2>

  <input type="file" id="fileInput">
  <p id="status"></p>

  <img id="preview" width="200">
</div>

<!-- GALLERY -->
<div class="box">
  <h2>Gallery</h2>
  <div id="gallery"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCg6tSHCPJqgTXo3QX1DEwgdROLonj9p20",
  authDomain: "science-af1d8.firebaseapp.com",
  databaseURL: "https://science-af1d8-default-rtdb.firebaseio.com",
  projectId: "science-af1d8",
  storageBucket: "science-af1d8.firebasestorage.app",
  messagingSenderId: "779390611141",
  appId: "1:779390611141:web:02c169354a1e8dbf4f0aac"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const cloudName = "dfc4j6dae";
const uploadPreset = "Upload_Picture";

let uid = null;
let userEmail = null;

const userStatus = document.getElementById("userStatus");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");

// ===== AUTH =====
window.register = function () {
  createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
  .catch(err => alert(err.message));
};

window.login = function () {
  signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
  .catch(err => alert(err.message));
};

// ===== STATE =====
onAuthStateChanged(auth, (user) => {
  if (user) {
    uid = user.uid;
    userEmail = user.email;

    userStatus.innerText = "Logged in as: " + userEmail;
    loadImages();
  } else {
    userStatus.innerText = "Not logged in";
  }
});

// ===== UPLOAD =====
document.getElementById("fileInput").addEventListener("change", async function () {

  if (!uid) {
    alert("Log in to upload picture");
    return;
  }

  const file = this.files[0];

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", uploadPreset);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
    {
      method: "POST",
      body: formData
    }
  );

  const data = await res.json();

  push(ref(db, "users/" + uid + "/images"), {
    url: data.secure_url,
    email: userEmail
  });

  document.getElementById("preview").src = data.secure_url;
});

// ===== LOAD =====
function loadImages() {
  onValue(ref(db, "users/" + uid + "/images"), (snapshot) => {

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    snapshot.forEach(child => {
      const d = child.val();

      const img = document.createElement("img");
      img.src = d.url;
      img.width = 200;

      const p = document.createElement("p");
      p.innerText = d.email;

      gallery.appendChild(img);
      gallery.appendChild(p);
    });
  });
}

</script>

</body>
</html>
