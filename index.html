<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCg6tSHCPJqgTXo3QX1DEwgdROLonj9p20",
  authDomain: "science-af1d8.firebaseapp.com",
  databaseURL: "https://science-af1d8-default-rtdb.firebaseio.com",
  projectId: "science-af1d8",
  storageBucket: "science-af1d8.firebasestorage.app",
  messagingSenderId: "779390611141",
  appId: "1:779390611141:web:02c169354a1e8dbf4f0aac",
  measurementId: "G-0SMFGP5P1X"
};

// ===== 初始化 =====
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// ===== Cloudinary（这里填你的） =====
const cloudName = "dfc4j6dae";
const uploadPreset = "Upload_Picture";

// ===== 获取 DOM =====
const userStatus = document.getElementById("userStatus");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");

let uid = null;
let userEmail = null;

// ===== 注册 =====
window.register = function () {
  createUserWithEmailAndPassword(
    auth,
    emailInput.value,
    passwordInput.value
  );
};

// ===== 登录 =====
window.login = function () {
  signInWithEmailAndPassword(
    auth,
    emailInput.value,
    passwordInput.value
  );
};

// ===== 登录状态监听 =====
onAuthStateChanged(auth, (user) => {
  if (user) {
    uid = user.uid;
    userEmail = user.email;

    userStatus.innerText = "Logged in: " + userEmail;

    loadImages();
  } else {
    userStatus.innerText = "Not logged in";
  }
});

// ===== 上传 =====
document.getElementById("fileInput").addEventListener("change", async function () {

  if (!uid) {
    alert("Please log in first");
    return;
  }

  const file = this.files[0];

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", uploadPreset);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
    {
      method: "POST",
      body: formData
    }
  );

  const data = await res.json();

  push(ref(db, "users/" + uid + "/images"), {
    url: data.secure_url,
    email: userEmail
  });

  document.getElementById("preview").src = data.secure_url;
});

// ===== 加载图片 =====
function loadImages() {
  onValue(ref(db, "users/" + uid + "/images"), (snapshot) => {

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    snapshot.forEach(child => {
      const d = child.val();

      const img = document.createElement("img");
      img.src = d.url;
      img.width = 200;

      const p = document.createElement("p");
      p.innerText = d.email;

      gallery.appendChild(img);
      gallery.appendChild(p);
    });
  });
}

</script>
