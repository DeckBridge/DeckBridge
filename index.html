<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Environmental Science</title>

  <h1>Welcome!</h1>
<p>This is a site for environmental science</p>
  
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #f2f2f2;
      padding: 50px;
    }

    h1 { color: blue; }
    button { padding: 10px 20px; font-size: 16px; }
    input { margin: 5px; padding: 5px; }
  </style>
</head>

<body>

<h2>Login System</h2>

<input id="email" placeholder="email">
<input id="password" placeholder="password">

<button onclick="register()">Sign Up</button>
<button onclick="login()">Log In</button>

<p id="userStatus">Please log in to upload your picture</p>

<h2>Upload Image</h2>

<input type="file" id="fileInput">
<p id="status"></p>

<img id="preview" width="300">

<div id="gallery"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onValue
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

// ===== Firebase config =====
const firebaseConfig = {
  apiKey: "AIzaSyCg6tSHCPJqgTXo3QX1DEwgdROLonj9p20",
  authDomain: "science-af1d8.firebaseapp.com",
  databaseURL: "https://science-af1d8-default-rtdb.firebaseio.com",
  projectId: "science-af1d8",
  storageBucket: "science-af1d8.firebasestorage.app",
  messagingSenderId: "779390611141",
  appId: "1:779390611141:web:02c169354a1e8dbf4f0aac"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// ===== Cloudinary =====
const cloudName = "dfc4j6dae";
const uploadPreset = "Upload_Picture";

// ===== 当前用户 =====
let uid = null;
let email = null;

// ===== UI状态 =====
const userStatus = document.getElementById("userStatus");

// ===== 注册 =====
window.register = function () {
  const em = document.getElementById("email").value;
  const pw = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, em, pw)
    .then(() => alert("Sign up successfully"))
    .catch(err => alert(err.message));
};

// ===== 登录 =====
window.login = function () {
  const em = document.getElementById("email").value;
  const pw = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, em, pw)
    .then(() => alert("Log in successfully"))
    .catch(err => alert(err.message));
};

// ===== 登录状态监听 =====
onAuthStateChanged(auth, (user) => {
  if (user) {
    uid = user.uid;
    email = user.email;

    userStatus.innerText = "You are now logged in as: " + email;

    loadImages();
  } else {
    uid = null;
    email = null;
    userStatus.innerText = "Not logged in";
  }
});

// ===== 上传 =====
document.getElementById("fileInput").addEventListener("change", async function () {

  if (!uid) {
    alert("Please log in first");
    return;
  }

  const file = this.files[0];

  document.getElementById("status").innerText = "Uploading...";

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", uploadPreset);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
    {
      method: "POST",
      body: formData
    }
  );

  const data = await res.json();

  if (!data.secure_url) {
    document.getElementById("status").innerText = "Upload failed";
    console.log(data);
    return;
  }

  // 存数据库
  push(ref(db, "users/" + uid + "/images"), {
    url: data.secure_url,
    email: email,
    time: Date.now()
  });

  document.getElementById("preview").src = data.secure_url;
  document.getElementById("status").innerText = "Upload successfully！";
});

// ===== 加载图片 =====
function loadImages() {

  onValue(ref(db, "users/" + uid + "/images"), (snapshot) => {

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    snapshot.forEach(child => {
      const data = child.val();

      const img = document.createElement("img");
      img.src = data.url;
      img.width = 200;
      img.style.margin = "10px";

      const text = document.createElement("p");
      text.innerText = "Uploader：" + data.email;

      gallery.appendChild(img);
      gallery.appendChild(text);
    });

  });
}
};
