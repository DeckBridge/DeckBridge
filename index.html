<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Environmental Science</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #f2f2f2;
      padding: 50px;
    }

    h1 { color: blue; }

    .navbar {
      background-color: #333;
      padding: 15px;
    }

    .navbar a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-size: 18px;
    }
  </style>
</head>

<body>

<!-- 🔝 导航 -->
<div class="navbar">
  <a href="index.html">Home</a>
  <a href="about.html">About Us</a>
</div>

<h1>Welcome!</h1>
<p>This is a site for environmental science</p>

<h2>Login System</h2>

<input id="email" placeholder="email">
<input id="password" placeholder="password">

<button onclick="register()">Sign Up</button>
<button onclick="login()">Log In</button>

<p id="userStatus">Please log in</p>

<h2>Upload Image</h2>

<input type="file" id="fileInput">
<p id="status"></p>

<img id="preview" width="300">

<div id="gallery"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "你的key",
  authDomain: "xxx.firebaseapp.com",
  databaseURL: "xxx",
  projectId: "xxx",
  storageBucket: "xxx",
  messagingSenderId: "xxx",
  appId: "xxx"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const cloudName = "dfc4j6dae";
const uploadPreset = "Upload_Picture";

let uid = null;
let email = null;

window.register = function () {
  createUserWithEmailAndPassword(auth, email.value, password.value);
};

window.login = function () {
  signInWithEmailAndPassword(auth, email.value, password.value);
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    uid = user.uid;
    email = user.email;
    userStatus.innerText = "Logged in: " + email;
    loadImages();
  }
});

document.getElementById("fileInput").addEventListener("change", async function () {

  if (!uid) {
    alert("Please log in first");
    return;
  }

  const file = this.files[0];

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", uploadPreset);

  const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  push(ref(db, "users/" + uid + "/images"), {
    url: data.secure_url,
    email: email
  });

  preview.src = data.secure_url;
});

function loadImages() {
  onValue(ref(db, "users/" + uid + "/images"), (snapshot) => {
    gallery.innerHTML = "";

    snapshot.forEach(child => {
      const d = child.val();

      const img = document.createElement("img");
      img.src = d.url;
      img.width = 200;

      const p = document.createElement("p");
      p.innerText = d.email;

      gallery.appendChild(img);
      gallery.appendChild(p);
    });
  });
}

</script>

</body>
</html>
