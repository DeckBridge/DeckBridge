<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  font-family: Arial;
  background: #f1f5f9;
  margin: 0px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* navbar */
.navbar {
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 15px;
  background: #93c5fd;

  position: sticky;
  top: 0;
  z-index: 1000;
}

.navbar a {
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.navbar a:hover {
  transform: scale(1.2);
  text-decoration: underline;
}

/* content */
.container {
  flex: 1; /* ⭐ pushes footer down */
  padding: 20px;
  color: #334155;
  text-align: center;
}

/* text */
h1 {
  margin-top: 40px;
}

p {
  max-width: 600px;
  margin: 0 auto;
}

/* footer */
.footer {
  color: #64748b;
  padding: 20px;
  text-align: center;
  border-top: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="navbar">
  <a href="index.html">Home</a>
  <a href="about.html">About Us</a>
  <a href="physics.html">Physics</a>
  <a href="envisci.html">Environmental Science</a>
  <a href="upload-pictures.html">Upload Pictures</a>
</div>

<div class="container">
  <h1>Welcome!</h1>
  <p>This is a site for environmental science</p>
</div>

<div class="footer">
  <p><b>DeckBridge</b></p>
  <p>Site by Gia Jing</p>
</div>

</body>
</html>
