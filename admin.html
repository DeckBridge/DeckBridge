<h1>管理员查看上传图片</h1>

<div id="gallery"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyCg6tSHCPJqgTXo3QX1DEwgdROLonj9p20",
  authDomain: "science-af1d8.firebaseapp.com",
  databaseURL: "https://science-af1d8-default-rtdb.firebaseio.com",
  projectId: "science-af1d8",
  storageBucket: "science-af1d8.firebasestorage.app",
  messagingSenderId: "779390611141",
  appId: "1:779390611141:web:02c169354a1e8dbf4f0aac",
  measurementId: "G-0SMFGP5P1X"
});

const db = getDatabase(app);
const gallery = document.getElementById("gallery");

onValue(ref(db, "images"), (snapshot) => {
  gallery.innerHTML = "";

  snapshot.forEach(child => {
    const data = child.val(); // 👈 now it's an object

    const container = document.createElement("div");
    container.style.margin = "15px";
    container.style.padding = "10px";
    container.style.border = "1px solid #ccc";
    container.style.borderRadius = "10px";

    const img = document.createElement("img");
    img.src = data.url;
    img.width = 200;

    const info = document.createElement("p");
    info.innerText = 
      "Uploader: " + data.email + 
      " | UID: " + data.uid +
      " | Time: " + new Date(data.time).toLocaleString();

    container.appendChild(img);
    container.appendChild(info);

    gallery.appendChild(container);
  });
});
</script>
