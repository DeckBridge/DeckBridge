<h1>管理员查看上传图片</h1>

<div id="gallery"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyCg6tSHCPJqgTXo3QX1DEwgdROLonj9p20",
  authDomain: "science-af1d8.firebaseapp.com",
  databaseURL: "https://science-af1d8-default-rtdb.firebaseio.com",
  projectId: "science-af1d8",
  storageBucket: "science-af1d8.firebasestorage.app",
  messagingSenderId: "779390611141",
  appId: "1:779390611141:web:02c169354a1e8dbf4f0aac",
  measurementId: "G-0SMFGP5P1X"
});

const db = getDatabase(app);
const gallery = document.getElementById("gallery");

onValue(ref(db, "images"), (snapshot) => {
  gallery.innerHTML = "";
  snapshot.forEach(child => {
    const img = document.createElement("img");
    img.src = child.val();
    img.width = 200;
    gallery.appendChild(img);
  });
});
</script>
